name: VoxType
options:
  bundleIdPrefix: com.manalabs
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "17.0"
  minimumXcodeGenVersion: "2.40"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    version: 0.15.0

targets:
  VoxType:
    type: application
    platform: macOS
    sources: [VoxType]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.manalabs.voxtype
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: VoxType/Info.plist
        # 菜单栏 App，不显示在 Dock
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: VoxType/VoxType.entitlements
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
    dependencies:
      - package: WhisperKit
    entitlements:
      path: VoxType/VoxType.entitlements
